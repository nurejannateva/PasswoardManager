


 <!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Unlock</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-teal-100 flex items-center justify-center min-h-screen">

<div class="bg-white p-8 rounded-2xl shadow-xl text-center w-80">

    <h2 class="text-xl font-bold mb-6">Unlock Vault</h2>

    <input id="pass" type="password" placeholder="Enter PIN"
        class="w-full p-3 border rounded-xl mb-4 text-center">

    <button onclick="unlock()"
        class="w-full bg-teal-600 text-white py-3 rounded-xl">
        Unlock
    </button>

    <p class="mt-4">
        <a href="page2.html" class="text-teal-600 text-sm">Change PIN</a>
    </p>

</div>

<script>
function unlock() {
    let input = document.getElementById("pass").value;
    let saved = localStorage.getItem("pin") || "1234";

    if (input == saved) {
        window.location.href = "page3.html";
    } else {
        alert("Wrong PIN");
    }
}
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vault Dashboard</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>

    <!--  Alpine.js added -->
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    
    <style>
        body { font-family: 'poppins', sans-serif; }
    </style>
</head>

<body class="bg-teal-100 min-h-screen flex items-center justify-center p-4">

    <!--  x-data added (NOT removed anything) -->
    <div x-data="{ open: false }" class="w-full max-w-2xl backdrop-blur-md bg-white/30 p-6 md:p-8 rounded-[2.5rem] shadow-2xl border border-white/50">
        
        <div class="flex justify-between items-center mb-8">
           <a href="page1.html">
            <button class="px-8 hover:bg-teal-700 py-2 bg-teal-600 text-white text-white font-bold rounded-xl transition-colors shadow-sm active:scale-95">
                Exit
            </button>
           </a>

            <button 
                @click="open = true"
                class="px-8 py-2 bg-teal-600 text-white font-bold rounded-xl hover:bg-teal-700 transition-all shadow-lg shadow-teal-200 active:scale-95"
            >
                Add New
            </button>
        </div>

        <div class="space-y-4">
            
            <div class="flex flex-wrap items-center justify-between gap-4 p-5 bg-white/60 rounded-2xl border border-teal-50 hover:bg-white/80 transition-all group">
                <div class="flex flex-col">
                    <span class="text-sm font-bold text-teal-900/50 uppercase tracking-wider">Username</span>
                    <span class="text-sm font-bold text-teal-900/50 uppercase tracking-wider mt-1">Password</span>
                </div>
                
                <div class="flex gap-2">
                    <button title="Copy" class="p-3 bg-white text-teal-600 rounded-xl border border-teal-100 hover:bg-teal-600 hover:text-white transition-all shadow-sm">
                        <i data-lucide="copy" class="w-5 h-5"></i>
                    </button>
                    <button title="Edit" class="p-3 bg-white text-blue-600 rounded-xl border border-blue-100 hover:bg-blue-600 hover:text-white transition-all shadow-sm">
                        <i data-lucide="edit-3" class="w-5 h-5"></i>
                    </button>
                    <button title="Delete" class="p-3 bg-white text-red-500 rounded-xl border border-red-100 hover:bg-red-500 hover:text-white transition-all shadow-sm">
                        <i data-lucide="trash-2" class="w-5 h-5"></i>
                    </button>
                </div>
            </div>




            <div class="flex flex-wrap items-center justify-between gap-4 p-5 bg-white/60 rounded-2xl border border-teal-50 hover:bg-white/80 transition-all group">
                <div class="flex flex-col">
                    <span class="text-sm font-bold text-teal-900/50 uppercase tracking-wider">Username</span>
                    <span class="text-sm font-bold text-teal-900/50 uppercase tracking-wider mt-1">Password</span>
                </div>
                
                <div class="flex gap-2">
                    <button title="Copy" class="p-3 bg-white text-teal-600 rounded-xl border border-teal-100 hover:bg-teal-600 hover:text-white transition-all shadow-sm">
                        <i data-lucide="copy" class="w-5 h-5"></i>
                    </button>
                    <button title="Edit" class="p-3 bg-white text-blue-600 rounded-xl border border-blue-100 hover:bg-blue-600 hover:text-white transition-all shadow-sm">
                        <i data-lucide="edit-3" class="w-5 h-5"></i>
                    </button>
                    <button title="Delete" class="p-3 bg-white text-red-500 rounded-xl border border-red-100 hover:bg-red-500 hover:text-white transition-all shadow-sm">
                        <i data-lucide="trash-2" class="w-5 h-5"></i>
                    </button>
                </div>
            </div>

            

        </div>

        <!-- MODAL -->
        <div 
            x-show="open" 
            x-transition:opacity
            class="fixed inset-0 z-50 flex items-center justify-center p-4 bg-teal-900/40 backdrop-blur-sm"
            style="display: none;"
        >
            <div 
                @click.away="open = false"
                x-transition:scale
                class="w-full max-w-sm backdrop-blur-md bg-white/80 p-8 rounded-[2.5rem] shadow-2xl border border-white flex flex-col items-center"
            >
                <h2 class="text-xl font-bold text-teal-900 mb-6">Add New Credential</h2>

                <div class="w-full space-y-4 mb-8">
                    <input 
                        type="text" 
                        placeholder="Platform"
                        class="w-full px-6 py-4 rounded-2xl bg-white border border-teal-100 text-teal-900 text-center outline-none focus:ring-4 focus:ring-teal-500/20 focus:border-teal-500 transition-all placeholder:text-teal-300 font-medium"
                    />
                    
                    <input 
                        type="text" 
                        placeholder="Username"
                        class="w-full px-6 py-4 rounded-2xl bg-white border border-teal-100 text-teal-900 text-center outline-none focus:ring-4 focus:ring-teal-500/20 focus:border-teal-500 transition-all placeholder:text-teal-300 font-medium"
                    />

                    <input 
                        type="password" 
                        placeholder="Password"
                        class="w-full px-6 py-4 rounded-2xl bg-white border border-teal-100 text-teal-900 text-center outline-none focus:ring-4 focus:ring-teal-500/20 focus:border-teal-500 transition-all placeholder:text-teal-300 font-medium"
                    />
                </div>

                <div class="flex flex-col w-full gap-3">
                    <a href="page1.html">
                    <button 
                        
                        class="w-full py-3 bg-teal-600 text-white font-bold rounded-xl shadow-md hover:bg-teal-700 active:scale-95 transition-all"
                    >
                        Save
                    </button>
                    </a>
                    <button 
                        @click="open = false"
                        class="w-full py-2 text-teal-600 font-semibold hover:text-teal-800 transition-colors text-sm"
                    >
                        Cancel
                    </button>
                </div>
            </div>
        </div>

    </div>

    <script>
        lucide.createIcons();
    </script>

</body>
</html>

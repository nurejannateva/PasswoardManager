<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vault Dashboard</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/lucide@latest"></script>
<script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

<style>
body { font-family: 'poppins', sans-serif; }
</style>
</head>

<body class="bg-teal-100 min-h-screen flex items-center justify-center p-4">

<div x-data="{ open: false }" class="w-full max-w-2xl backdrop-blur-md bg-white/30 p-6 md:p-8 rounded-[2.5rem] shadow-2xl border border-white/50">

<!-- HEADER -->
<div class="flex justify-between items-center mb-8">
    <a href="index.html">
        <button class="px-8 py-2 bg-teal-600 text-white font-bold rounded-xl hover:bg-teal-700">
            Exit
        </button>
    </a>

    <button @click="open = true"
        class="px-8 py-2 bg-teal-600 text-white font-bold rounded-xl hover:bg-teal-700">
        Add New
    </button>
</div>

<!-- LIST -->
<div id="list" class="space-y-4"></div>

<!-- MODAL -->
<div x-show="open"
    class="fixed inset-0 flex items-center justify-center bg-teal-900/40 backdrop-blur-sm"
    style="display:none;">

    <div @click.away="open = false"
        class="w-full max-w-sm bg-white p-8 rounded-[2rem] shadow-2xl flex flex-col items-center">

        <h2 class="text-xl font-bold text-teal-900 mb-6">Add New Credential</h2>

        <div class="w-full space-y-4 mb-6">
            <input id="username" type="text" placeholder="Username"
                class="w-full px-4 py-3 rounded-xl border">

            <input id="password" type="password" placeholder="Password"
                class="w-full px-4 py-3 rounded-xl border">
        </div>

        <button onclick="saveData()"
            class="w-full py-3 bg-teal-600 text-white rounded-xl mb-2">
            Save
        </button>

        <button @click="open = false" class="text-sm text-teal-600">
            Cancel
        </button>
    </div>
</div>

</div>

<script>
lucide.createIcons();

// DATA
let data = JSON.parse(localStorage.getItem("vault")) || [];

// RENDER
function render() {
    const list = document.getElementById("list");
    list.innerHTML = "";

    data.forEach((item, index) => {
        list.innerHTML += `
        <div class="flex flex-wrap items-center justify-between gap-4 p-5 bg-white/60 rounded-2xl border border-teal-50 hover:bg-white/80">

            <div class="flex flex-col">
                <span class="text-sm font-bold text-teal-900/50 uppercase tracking-wider">Username</span>
                <span class="mt-1 text-teal-900 font-semibold">${item.username}</span>

                <span class="text-sm font-bold text-teal-900/50 uppercase tracking-wider mt-3">Password</span>
                <span class="mt-1 text-teal-900 font-semibold">${item.password}</span>
            </div>

            <div class="flex gap-2">
                <button onclick="copyData(${index})"
                    class="p-3 bg-white text-teal-600 rounded-xl border hover:bg-teal-600 hover:text-white">
                    <i data-lucide="copy" class="w-5 h-5"></i>
                </button>

                <button onclick="deleteData(${index})"
                    class="p-3 bg-white text-red-500 rounded-xl border hover:bg-red-500 hover:text-white">
                    <i data-lucide="trash-2" class="w-5 h-5"></i>
                </button>
            </div>

        </div>
        `;
    });

    lucide.createIcons();
}

// SAVE
function saveData() {
    const username = document.getElementById("username").value;
    const password = document.getElementById("password").value;

    if (!username || !password) {
        alert("Fill all fields");
        return;
    }

    data.push({ username, password });
    localStorage.setItem("vault", JSON.stringify(data));

    document.getElementById("username").value = "";
    document.getElementById("password").value = "";

    render();
    alert("Saved!");
}

// COPY
function copyData(i) {
    const item = data[i];
    navigator.clipboard.writeText(
        `Username: ${item.username}\nPassword: ${item.password}`
    );
    alert("Copied!");
}

// DELETE
function deleteData(i) {
    data.splice(i, 1);
    localStorage.setItem("vault", JSON.stringify(data));
    render();
}

// INIT
render();
</script>

</body>
</html>
